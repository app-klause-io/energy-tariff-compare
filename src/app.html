<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#059669" />
		<meta
			name="description"
			content="Compare cheap energy tariffs UK — find the best electricity deals for EV owners, heat pump homes, and high-usage households. Free, no sign-up required."
		/>
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="canonical" href="https://bestenergytariffs.co.uk/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Best Energy Tariffs UK — Compare Cheap Electricity Deals" />
		<meta
			property="og:description"
			content="Compare cheap energy tariffs UK — find the best electricity deals for EV owners, heat pump homes, and high-usage households. Free, no sign-up required."
		/>
		<meta property="og:url" content="https://bestenergytariffs.co.uk/" />
		<meta property="og:site_name" content="Best Energy Tariffs" />
		<meta property="og:image" content="https://bestenergytariffs.co.uk/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="en_GB" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Best Energy Tariffs UK — Compare Cheap Electricity Deals" />
		<meta
			name="twitter:description"
			content="Compare cheap energy tariffs UK — find the best electricity deals for EV owners, heat pump homes, and high-usage households. Free, no sign-up required."
		/>
		<meta name="twitter:image" content="https://bestenergytariffs.co.uk/og-image.png" />

		<!-- JSON-LD Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "Best Energy Tariffs",
				"url": "https://bestenergytariffs.co.uk",
				"description": "Compare UK energy tariffs based on your actual usage. Find the cheapest electricity deals for EV owners, heat pumps, and high-usage homes.",
				"applicationCategory": "UtilitiesApplication",
				"operatingSystem": "Web",
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "GBP"
				},
				"author": {
					"@type": "Organization",
					"name": "Best Energy Tariffs"
				}
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
