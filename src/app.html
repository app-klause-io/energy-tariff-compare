<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#059669" />
		<meta
			name="description"
			content="Compare UK energy tariffs based on your actual usage. Built for EV owners, heat pump homes, and anyone tired of generic comparison sites."
		/>
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="canonical" href="https://energy-tariff-compare.vercel.app/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Energy Tariff Compare — Find Your Cheapest Energy Deal" />
		<meta
			property="og:description"
			content="Compare UK energy tariffs based on your actual usage. Built for EV owners, heat pump homes, and anyone tired of generic comparison sites."
		/>
		<meta property="og:url" content="https://energy-tariff-compare.vercel.app/" />
		<meta property="og:site_name" content="Energy Tariff Compare" />
		<meta property="og:image" content="https://energy-tariff-compare.vercel.app/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="en_GB" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Energy Tariff Compare — Find Your Cheapest Energy Deal" />
		<meta
			name="twitter:description"
			content="Compare UK energy tariffs based on your actual usage. Built for EV owners, heat pump homes, and anyone tired of generic comparison sites."
		/>
		<meta name="twitter:image" content="https://energy-tariff-compare.vercel.app/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
